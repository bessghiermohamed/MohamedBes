<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الاستبيان - تكوين المعلمين 📊</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card: #1a1830;
    --card2: #221f3a;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #c77dff;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(77,150,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(199,125,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .hero {
    text-align: center;
    padding: 40px 20px 30px;
    margin-bottom: 30px;
  }
  .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
  .hero h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent2), var(--accent4));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .hero p { color: var(--muted); font-size: 15px; }
  .badge {
    display: inline-block;
    background: rgba(255,217,61,0.12);
    border: 1px solid rgba(255,217,61,0.3);
    color: var(--accent2);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    margin-bottom: 16px;
    font-weight: 700;
  }
  .nav-links {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .nav-link {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.2s;
  }
  .nav-link:hover { background: var(--accent4); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .stat-icon { font-size: 32px; margin-bottom: 8px; }
  .stat-number { font-size: 36px; font-weight: 900; color: var(--accent4); }
  .stat-label { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 22px;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .section-title h2 { font-size: 18px; font-weight: 700; }

  .chart-container {
    background: var(--card2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .chart-label {
    font-size: 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .chart-bar {
    height: 24px;
    background: linear-gradient(90deg, var(--accent4), var(--accent5));
    border-radius: 8px;
    transition: width 0.5s ease;
  }

  .response-item {
    background: var(--card2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    border-right: 4px solid var(--accent4);
  }
  .response-time {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .response-text {
    font-size: 14px;
    line-height: 1.6;
  }

  .email-preview {
    background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,217,61,0.1));
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;
  }
  .email-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .email-icon { font-size: 40px; }
  .email-info h3 { font-size: 18px; font-weight: 700; }
  .email-info p { font-size: 13px; color: var(--muted); }
  .email-body {
    background: var(--card2);
    border-radius: 12px;
    padding: 16px;
  }
  .email-field {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .email-field:last-child { border-bottom: none; }
  .email-field-label { font-size: 12px; color: var(--accent2); margin-bottom: 4px; }
  .email-field-value { font-size: 14px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state-emoji { font-size: 64px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  .refresh-btn {
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { transform: translateY(-2px); }

  .s1 .section-icon { background: rgba(77,150,255,0.15); }
  .s2 .section-icon { background: rgba(107,203,119,0.15); }
  .s3 .section-icon { background: rgba(255,107,107,0.15); }
  .s4 .section-icon { background: rgba(255,217,61,0.15); }

  @media(max-width:480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .section { padding: 16px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="hero">
    <span class="hero-emoji">📊</span>
    <div class="badge">تكوين المعلمين</div>
    <h1>نتائج الاستبيان</h1>
    <p>عرض وتحليل إجابات الاستبيان تلقائيًا</p>
    <div class="nav-links">
      <a href="استبيان_نهاية_العام_موسّع.html" class="nav-link">📝 العودة للاستبيان</a>
      <a href="#" onclick="location.reload()" class="nav-link">🔄 تحديث</a>
    </div>
  </div>

  <div id="content">
    <div class="empty-state">
      <span class="empty-state-emoji">📭</span>
      <h3>لا توجد إجابات بعد</h3>
      <p>بمجرد أن يُجيب أحد على الاستبيان، ستظهر النتائج هنا تلقائيًا</p>
      <button class="refresh-btn" onclick="location.reload()">🔄 تحديث الصفحة</button>
    </div>
  </div>

  <div id="email-preview" class="email-preview" style="display:none;">
    <div class="email-header">
      <span class="email-icon">📧</span>
      <div class="email-info">
        <h3>تم إرسال بريد إلكتروني إلى</h3>
        <p><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="5210372121353a3b37203f3d3a333f37366a12353f333b3e7c313d3f">[email&#160;protected]</a></p>
      </div>
    </div>
    <div class="email-body" id="email-content">
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js" defer></script><script>
  function loadResults() {
    const responses = JSON.parse(localStorage.getItem('surveyResponses') || '[]');
    const latestEmail = JSON.parse(localStorage.getItem('latestEmail') || 'null');
    const content = document.getElementById('content');

    if (responses.length === 0) {
      return;
    }

    // Calculate statistics
    const stats = {
      totalResponses: responses.length,
      averageRating: 0,
      categories: {
        professors: { total: 0, count: 0 },
        atmosphere: { total: 0, count: 0 },
        infrastructure: { total: 0, count: 0 },
        training: { total: 0, count: 0 },
        general: { total: 0, count: 0 }
      }
    };

    const ratingQuestions = ['q1', 'q5', 'q8', 'q10', 'q12', 'q15', 'q17', 'q19', 'q32'];
    let totalRating = 0;
    let ratingCount = 0;

    responses.forEach(r => {
      ratingQuestions.forEach(q => {
        if (r[q] && !Array.isArray(r[q])) {
          totalRating += parseInt(r[q]);
          ratingCount++;
        }
      });
    });

    stats.averageRating = ratingCount > 0 ? (totalRating / ratingCount).toFixed(1) : 0;

    // Build results HTML
    let html = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-number">${stats.totalResponses}</div>
          <div class="stat-label">عدد الإجابات</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-number">${stats.averageRating}</div>
          <div class="stat-label">المتوسط العام</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <div class="stat-number">${new Date().toLocaleDateString('ar-DZ')}</div>
          <div class="stat-label">آخر تحديث</div>
        </div>
      </div>
    `;

    // Question 1: Overall satisfaction
    const q1Responses = responses.filter(r => r.q1).map(r => parseInt(r.q1));
    const q1Avg = q1Responses.length > 0 ? (q1Responses.reduce((a, b) => a + b, 0) / q1Responses.length).toFixed(1) : 0;
    html += `
      <div class="section s1">
        <div class="section-title">
          <div class="section-icon">👨‍🏫</div>
          <h2>الأساتذة وطرق التدريس</h2>
        </div>
        <div class="chart-container">
          <div class="chart-label">
            <span>الرضا العام عن الأساتذة</span>
            <span>⭐ ${q1Avg} / 5</span>
          </div>
          <div class="chart-bar" style="width: ${(q1Avg / 5) * 100}%"></div>
        </div>
    `;

    // Question 8: Delegate satisfaction
    const q8Responses = responses.filter(r => r.q8).map(r => parseInt(r.q8));
    const q8Avg = q8Responses.length > 0 ? (q8Responses.reduce((a, b) => a + b, 0) / q8Responses.length).toFixed(1) : 0;
    html += `
        <div class="chart-container">
          <div class="chart-label">
            <span>رضا عن ممثل الفوج</span>
            <span>⭐ ${q8Avg} / 5</span>
          </div>
          <div class="chart-bar" style="width: ${(q8Avg / 5) * 100}%"></div>
        </div>
      </div>
    `;

    // Question 12: Infrastructure
    const q12Responses = responses.filter(r => r.q12).map(r => parseInt(r.q12));
    const q12Avg = q12Responses.length > 0 ? (q12Responses.reduce((a, b) => a + b, 0) / q12Responses.length).toFixed(1) : 0;
    html += `
      <div class="section s3">
        <div class="section-title">
          <div class="section-icon">🏛️</div>
          <h2>البنية التحتية</h2>
        </div>
        <div class="chart-container">
          <div class="chart-label">
            <span>جودة القاعات والتجهيزات</span>
            <span>⭐ ${q12Avg} / 5</span>
          </div>
          <div class="chart-bar" style="width: ${(q12Avg / 5) * 100}%"></div>
        </div>
    `;

    // Question 15: Library
    const q15Responses = responses.filter(r => r.q15).map(r => parseInt(r.q15));
    const q15Avg = q15Responses.length > 0 ? (q15Responses.reduce((a, b) => a + b, 0) / q15Responses.length).toFixed(1) : 0;
    html += `
        <div class="chart-container">
          <div class="chart-label">
            <span>تقييم المكتبة</span>
            <span>⭐ ${q15Avg} / 5</span>
          </div>
          <div class="chart-bar" style="width: ${(q15Avg / 5) * 100}%"></div>
        </div>
      </div>
    `;

    // Question 32: Overall year
    const q32Responses = responses.filter(r => r.q32).map(r => parseInt(r.q32));
    const q32Avg = q32Responses.length > 0 ? (q32Responses.reduce((a, b) => a + b, 0) / q32Responses.length).toFixed(1) : 0;
    html += `
      <div class="section s4">
        <div class="section-title">
          <div class="section-icon">💬</div>
          <h2>التقييم العام للسنة</h2>
        </div>
        <div class="chart-container">
          <div class="chart-label">
            <span>رضا العام الدراسي</span>
            <span>⭐ ${q32Avg} / 5</span>
          </div>
          <div class="chart-bar" style="width: ${(q32Avg / 5) * 100}%"></div>
        </div>
      </div>
    `;

    // Latest responses text
    const latestResponse = responses[responses.length - 1];
    if (latestResponse) {
      html += `
        <div class="section s2">
          <div class="section-title">
            <div class="section-icon">📝</div>
            <h2>آخر إجابة</h2>
          </div>
      `;

      if (latestResponse.q4) {
        html += `
          <div class="response-item">
            <div class="response-time">⏰ ${new Date(latestResponse.timestamp).toLocaleString('ar-DZ')}</div>
            <div class="email-field-label">أفضل أستاذ أثر فيك</div>
            <div class="response-text">${latestResponse.q4}</div>
          </div>
        `;
      }

      if (latestResponse.q9) {
        html += `
          <div class="response-item">
            <div class="email-field-label">ما ينقص ممثل الفوج</div>
            <div class="response-text">${latestResponse.q9}</div>
          </div>
        `;
      }

      if (latestResponse.q14) {
        html += `
          <div class="response-item">
            <div class="email-field-label">أبرز مشكلة نتمنى حلها</div>
            <div class="response-text">${latestResponse.q14}</div>
          </div>
        `;
      }

      if (latestResponse.q21) {
        html += `
          <div class="response-item">
            <div class="email-field-label">صعوبة في مادة</div>
            <div class="response-text">${latestResponse.q21}</div>
          </div>
        `;
      }

      if (latestResponse.q27) {
        html += `
          <div class="response-item">
            <div class="email-field-label">أغرب موقف</div>
            <div class="response-text">${latestResponse.q27}</div>
          </div>
        `;
      }

      if (latestResponse.q28) {
        html += `
          <div class="response-item">
            <div class="email-field-label">لو كنت مديرًا</div>
            <div class="response-text">${latestResponse.q28}</div>
          </div>
        `;
      }

      if (latestResponse.q29) {
        html += `
          <div class="response-item">
            <div class="email-field-label">شخصية العام</div>
            <div class="response-text">${latestResponse.q29}</div>
          </div>
        `;
      }

      if (latestResponse.q31) {
        html += `
          <div class="response-item">
            <div class="email-field-label">ما ستشتاق له</div>
            <div class="response-text">${latestResponse.q31}</div>
          </div>
        `;
      }

      if (latestResponse.q33) {
        html += `
          <div class="response-item">
            <div class="email-field-label">رسالة لزملاء</div>
            <div class="response-text">${latestResponse.q33}</div>
          </div>
        `;
      }

      if (latestResponse.q34) {
        html += `
          <div class="response-item">
            <div class="email-field-label">نصيحة للإدارة</div>
            <div class="response-text">${latestResponse.q34}</div>
          </div>
        `;
      }

      html += `</div>`;
    }

    content.innerHTML = html;

    // Show email preview
    if (latestEmail) {
      const emailPreview = document.getElementById('email-preview');
      const emailContent = document.getElementById('email-content');
      emailPreview.style.display = 'block';

      let emailHtml = `
        <div class="email-field">
          <div class="email-field-label">إلى</div>
          <div class="email-field-value">${latestEmail.to}</div>
        </div>
        <div class="email-field">
          <div class="email-field-label">الموضوع</div>
          <div class="email-field-value">${latestEmail.subject}</div>
        </div>
      `;

      if (latestEmail.responses.q1) {
        emailHtml += `<div class="email-field"><div class="email-field-label">تقييم الأساتذة</div><div class="email-field-value">⭐ ${latestEmail.responses.q1}/5</div></div>`;
      }
      if (latestEmail.responses.q8) {
        emailHtml += `<div class="email-field"><div class="email-field-label">تقييم ممثل الفوج</div><div class="email-field-value">⭐ ${latestEmail.responses.q8}/5</div></div>`;
      }
      if (latestEmail.responses.q12) {
        emailHtml += `<div class="email-field"><div class="email-field-label">تقييم البنية التحتية</div><div class="email-field-value">⭐ ${latestEmail.responses.q12}/5</div></div>`;
      }
      if (latestEmail.responses.q32) {
        emailHtml += `<div class="email-field"><div class="email-field-label">التقييم العام</div><div class="email-field-value">⭐ ${latestEmail.responses.q32}/5</div></div>`;
      }

      emailContent.innerHTML = emailHtml;
    }
  }

  loadResults();

  // Auto-refresh every 10 seconds
  setInterval(loadResults, 10000);
</script>
</body>
</html>
